<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Your Password</title>
    <style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background-color: #000000; margin: 0; padding: 0; color: #ffffff; }
        .container { max-width: 600px; margin: 0 auto; background-color: #111111; border: 1px solid #222222; border-radius: 12px; overflow: hidden; margin-top: 40px; margin-bottom: 40px; }
        .header { padding: 40px; text-align: center; border-bottom: 1px solid #222222; }
        .logo { font-size: 24px; font-weight: 800; }
        .logo-flow { color: #888888; }
        .content { padding: 40px; text-align: center; }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 24px; color: #ffffff; }
        .code-container { background-color: #000000; border: 1px solid #333333; border-radius: 8px; padding: 24px; margin: 32px 0; letter-spacing: 12px; font-size: 32px; font-weight: 800; color: #ffffff; display: inline-block; width: 80%; }
        p { color: #888888; line-height: 1.6; font-size: 15px; margin-bottom: 24px; }
        .footer { padding: 32px; text-align: center; border-top: 1px solid #222222; background-color: #0a0a0a; }
        .footer-text { font-size: 12px; color: #444444; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">Libra<span class="logo-flow">Flow</span></div>
        </div>
        <div class="content">
            <h1>Reset Your Password</h1>
            <p>You requested a password reset for your LibraFlow account. Please use the following code to proceed.</p>
            <div class="code-container">{{code}}</div>
            <p>If you did not request this, please ignore this email or contact support if you have concerns.</p>
        </div>
        <div class="footer">
            <div class="footer-text">SECURE RESET • AUTHORIZED ACCESS ONLY</div>
        </div>
    </div>
</body>
</html>
